model:
  name_or_path: Qwen/Qwen2.5-VL-3B-Instruct
  trust_remote_code: true

data:
  train_file: workspace_data/sft/qwen2_5_vl_train.jsonl
  eval_file: workspace_data/sft/qwen2_5_vl_eval.jsonl
  image_root: /
  format: multimodal_chat_jsonl

training:
  output_dir: workspace_data/checkpoints/qwen2_5_vl_pdfqa_sft
  num_train_epochs: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  bf16: true
  gradient_checkpointing: true

loss:
  train_on_assistant_only: true
  max_length: 4096

notes:
  purpose: First-pass generator SFT for paper-style PDF QA.
  recommended_data_mix:
    - PDFVQA original QA
    - accepted synthetic QA from qwen2.5-vl
    - later add chart/table data such as ChartQA
  not_for:
    - reranker training
    - page relevance scoring
